<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SITTA UT - Aplikasi Pemesanan Bahan Ajar</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="app">
        <h2>Sistem Informasi Tiras & Distribusi Bahan Ajar (SITTA UT)</h2>
        
        <nav>
            <button :class="{ active: tab === 'stok' }" @click="tab = 'stok'">Stok</button>
            <button :class="{ active: tab === 'tracking' }" @click="tab = 'tracking'">Tracking DO</button>
            <button :class="{ active: tab === 'order' }" @click="tab = 'order'">Pemesanan</button>
        </nav>

        <section v-show="tab === 'stok'">
            <ba-stock-table 
                :items="state.stok" 
                :upbjj-list="state.upbjjList" 
                :kategori-list="state.kategoriList"
                @open-modal="openModal">
            </ba-stock-table>
        </section>

        <section v-show="tab === 'tracking'">
            <do-tracking :data-tracking="state.tracking"></do-tracking>
        </section>

        <section v-show="tab === 'order'">
            <order-form 
                :paket-list="state.paket" 
                :ekspedisi-list="state.pengirimanList"
                @add-tracking="handleNewDO">
            </order-form>
        </section>

        <app-modal ref="modal"></app-modal>
    </div>

    <template id="tpl-stock">
        <div>
            <h3>Daftar Stok Bahan Ajar</h3>
            <div class="border-box">
                <strong>Filter & Urutkan:</strong>
                <div style="display: flex; gap: 15px; margin-top: 10px; flex-wrap: wrap;">
                    <div>
                        <label>UT-Daerah: </label>
                        <select v-model="filterUpbjj">
                            <option value="">-- Semua UT --</option>
                            <option v-for="u in upbjjList" :key="u" :value="u">{{ u }}</option>
                        </select>
                    </div>
                    <div v-if="filterUpbjj">
                        <label>Kategori: </label>
                        <select v-model="filterKategori">
                            <option value="">-- Semua Kategori --</option>
                            <option v-for="k in kategoriList" :key="k" :value="k">{{ k }}</option>
                        </select>
                    </div>
                    <div>
                        <label>Kondisi Stok: </label>
                        <select v-model="filterKondisi">
                            <option value="all">Semua Data</option>
                            <option value="critical">Menipis / Kosong (Re-order)</option>
                        </select>
                    </div>
                    <div>
                        <label>Urutkan: </label>
                        <select v-model="sortBy">
                            <option value="judul">Judul Mata Kuliah</option>
                            <option value="qty">Jumlah Stok</option>
                            <option value="harga">Harga</option>
                        </select>
                    </div>
                    <button @click="resetFilter" style="background: #6c757d; color: white; border: none; padding: 5px 10px; cursor: pointer;">Reset Filter</button>
                </div>
            </div>

            <div class="border-box" style="margin-top: 15px;">
                <strong>{{ isEdit ? 'Edit' : 'Tambah' }} Data Stok (Tekan Enter untuk Simpan)</strong>
                <div style="display: flex; gap: 10px; margin-top: 10px; align-items: flex-end; flex-wrap: wrap;">
                    <input type="text" placeholder="Kode" v-model="form.kode" :disabled="isEdit">
                    <input type="text" placeholder="Judul MK" v-model="form.judul">
                    <select v-model="form.kategori">
                        <option value="">- Kategori -</option>
                        <option v-for="k in kategoriList" :value="k">{{k}}</option>
                    </select>
                    <select v-model="form.upbjj">
                        <option value="">- UT Daerah -</option>
                        <option v-for="u in upbjjList" :value="u">{{u}}</option>
                    </select>
                    <input type="text" placeholder="Rak" v-model="form.lokasiRak" style="width: 70px;">
                    <input type="number" placeholder="Harga" v-model.number="form.harga" style="width: 90px;">
                    <input type="number" placeholder="Qty" v-model.number="form.qty" style="width: 70px;" @keyup.enter="saveStock">
                    <input type="number" placeholder="Safety" v-model.number="form.safety" style="width: 70px;" @keyup.enter="saveStock">
                    <button @click="saveStock" style="background: #28a745; color: white; border: none; padding: 8px 12px; cursor: pointer;">Simpan</button>
                    <button v-if="isEdit" @click="cancelEdit" style="background: #dc3545; color: white; border: none; padding: 8px 12px; cursor: pointer;">Batal</button>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Kode / Judul Mata Kuliah</th>
                        <th>Kategori</th>
                        <th>UT-Daerah</th>
                        <th>Lokasi Rak</th>
                        <th>Harga</th>
                        <th>Stok / Safety</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    <tr v-for="item in filteredAndSortedItems" :key="item.kode">
                        <td><strong>{{ item.kode }}</strong> - {{ item.judul }}</td>
                        <td>{{ item.kategori }}</td>
                        <td>{{ item.upbjj }}</td>
                        <td>{{ item.lokasiRak }}</td>
                        <td>{{ item.harga | currency }}</td>
                        <td>{{ item.qty | satuan }} / {{ item.safety | satuan }}</td>
                        <td>
                            <status-badge :qty="item.qty" :safety="item.safety"></status-badge>
                            <div class="tooltip" v-html="item.catatanHTML || '<em>Tidak ada catatan</em>'"></div>
                        </td>
                        <td>
                            <button @click="editStock(item)" style="background: #ffc107; border: none; padding: 4px 8px; cursor: pointer; margin-right: 4px;">Edit</button>
                            <button @click="deleteStock(item.kode)" style="background: #dc3545; color: white; border: none; padding: 4px 8px; cursor: pointer;">Hapus</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </template>

    <template id="tpl-badge">
        <span :class="['badge', badgeClass]">
            {{ badgeText }}
        </span>
    </template>

    <template id="tpl-order">
        <div class="border-box">
            <h3>Form Entri Delivery Order (DO) Baru</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>Nomor DO (Otomatis):</label>
                    <input type="text" :value="generatedDoNumber" disabled style="background: #e9ecef;">
                </div>
                <div class="form-group">
                    <label>NIM Mahasiswa:</label>
                    <input type="text" v-model="form.nim" placeholder="Masukkan NIM">
                </div>
                <div class="form-group">
                    <label>Nama Lengkap:</label>
                    <input type="text" v-model="form.nama" placeholder="Masukkan Nama">
                </div>
                <div class="form-group">
                    <label>Ekspedisi:</label>
                    <select v-model="form.ekspedisi">
                        <option value="">-- Pilih Ekspedisi --</option>
                        <option v-for="e in ekspedisiList" :key="e.kode" :value="e.nama">{{ e.nama }}</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Paket Bahan Ajar:</label>
                    <select v-model="form.selectedPaketKode">
                        <option value="">-- Pilih Paket --</option>
                        <option v-for="p in paketList" :key="p.kode" :value="p.kode">{{ p.kode }} - {{ p.nama }}</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Tanggal Kirim:</label>
                    <input type="date" v-model="form.tanggalKirim">
                </div>
            </div>

            <div v-if="selectedPaketDetail" style="margin-top: 10px; background: #eef2f7; padding: 10px; border-radius: 4px;">
                <strong>Detail Isi Paket:</strong>
                <ul>
                    <li v-for="isi in selectedPaketDetail.isi" :key="isi">{{ isi }}</li>
                </ul>
                <strong>Total Harga Paket: </strong> <span>{{ selectedPaketDetail.harga | currency }}</span>
            </div>

            <button @click="submitOrder" style="background: #007bff; color: white; border: none; padding: 10px 15px; margin-top: 10px; cursor: pointer; border-radius: 4px;">Simpan Delivery Order</button>
        </div>
    </template>

    <template id="tpl-tracking">
        <div>
            <h3>Pencarian & Tracking Status Pengiriman</h3>
            <div class="border-box" style="display: flex; gap: 10px; align-items: center;">
                <input type="text" v-model="keyword" placeholder="Cari berdasarkan Nomor DO atau NIM... (Enter untuk cari, Esc untuk reset)" style="flex: 1; padding: 8px;" @keyup.enter="search" @keyup.esc="clearSearch">
                <button @click="search" style="padding: 8px 15px; background: #007bff; color: white; border: none; cursor: pointer;">Cari</button>
            </div>

            <div v-if="results.length > 0" style="margin-top: 15px;">
                <div v-for="(doItem, index) in results" :key="index" class="border-box" style="border-left: 5px solid #007bff; margin-bottom: 10px;">
                    <h4>📦 {{ doItem.doNumber }} - {{ doItem.nama }} (NIM: {{ doItem.nim }})</h4>
                    <p>
                        <strong>Paket:</strong> {{ doItem.paket }} | 
                        <strong>Ekspedisi:</strong> {{ doItem.ekspedisi }} | 
                        <strong>Tanggal Kirim:</strong> {{ doItem.tanggalKirim | formatTanggal }} | 
                        <strong>Total:</strong> {{ doItem.total | currency }} <br>
                        <strong>Status Utama:</strong> <span style="color: #007bff; font-weight: bold;">{{ doItem.status }}</span>
                    </p>
                    
                    <h5>Histori Perjalanan:</h5>
                    <ul>
                        <li v-for="(log, lIdx) in doItem.perjalanan" :key="lIdx">
                            <small style="color: #666;">[{{ log.waktu }}]</small> - {{ log.keterangan }}
                        </li>
                    </ul>

                    <div style="margin-top: 10px; background: #f1f1f1; padding: 8px; border-radius: 4px; display: flex; gap: 8px;">
                        <input type="text" v-model="newLogs[doItem.doNumber]" placeholder="Tambahkan keterangan update perjalanan..." style="flex: 1; padding: 4px;">
                        <button @click="addLogStatus(doItem.doNumber)" style="background: #28a745; color: white; border: none; padding: 4px 10px; cursor: pointer;">Update Lokasi</button>
                    </div>
                </div>
            </div>
            <div v-else-if="searched" style="margin-top: 15px; color: red;">
                Data DO atau NIM tidak ditemukan.
            </div>
        </div>
    </template>

    <template id="tpl-modal">
        <div v-if="visible" class="modal">
            <div class="modal-content">
                <h4>{{ title }}</h4>
                <p>{{ message }}</p>
                <div style="text-align: right; margin-top: 20px;">
                    <button @click="cancel" style="padding: 6px 12px; margin-right: 8px; background: #6c757d; color: white; border: none; cursor: pointer;">Batal</button>
                    <button @click="confirm" style="padding: 6px 12px; background: #dc3545; color: white; border: none; cursor: pointer;">Konfirmasi Hapus</button>
                </div>
            </div>
        </div>
    </template>

    <script src="js/services/api.js"></script>
    <script src="js/components/status-badge.js"></script>
    <script src="js/components/stock-table.js"></script>
    <script src="js/components/order-form.js"></script>
    <script src="js/components/do-tracking.js"></script>
    <script src="js/components/app-modal.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
